# Full-stack local dev environment for EVORIA.
#
#   docker compose up --build
#
# No .env files are required: safe local-dev defaults are baked in below.
# Every value can still be overridden from your shell environment if needed,
# e.g.  JWT_SECRET=... docker compose up
#
# Services:
#   db       PostgreSQL 16          -> localhost:5432
#   backend  Express/Prisma API     -> http://localhost:3000
#   frontend Next.js app            -> http://localhost:3001

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-evoria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evoria123}
      POSTGRES_DB: ${POSTGRES_DB:-evoria}
    ports:
      # If you already run Postgres locally on 5432, bring the stack up with
      #   DB_PORT=5433 docker compose up
      # (the backend reaches the DB internally via the `db` hostname regardless).
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evoria} -d ${POSTGRES_DB:-evoria}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./evoria-backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://evoria:evoria123@db:5432/evoria}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production-min32chars}
      PORT: "3000"
      NODE_ENV: development
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./evoria-frontend
      dockerfile: Dockerfile.dev
    environment:
      # NEXT_PUBLIC_* is read by the browser, so it points at the host-mapped
      # backend port, not the internal docker hostname.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  pgdata:
