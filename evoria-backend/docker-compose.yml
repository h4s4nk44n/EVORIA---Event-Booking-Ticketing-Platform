version: '3.8'

services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      PORT: "3000"
      NODE_ENV: production
      ALLOWED_ORIGIN: http://localhost:3001
    depends_on:
      - db

volumes:
  pgdata:
